name: Keep Render service alive

# Render's free tier spins a Web Service down after ~15 min of inactivity, which
# causes a ~60s cold start. This workflow pings /health every 10 minutes so the
# service stays warm (handy right before a live demo / interview).

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          # Set this in GitHub repo -> Settings -> Secrets and variables -> Actions
          # as a Variable named RENDER_EXTERNAL_URL, e.g. https://product-catalog-api.onrender.com
          RENDER_EXTERNAL_URL: ${{ vars.RENDER_EXTERNAL_URL }}
        run: |
          if [ -z "$RENDER_EXTERNAL_URL" ]; then
            echo "RENDER_EXTERNAL_URL is not set; skipping."
            exit 0
          fi
          echo "Pinging $RENDER_EXTERNAL_URL/health"
          curl -fsS --max-time 30 "$RENDER_EXTERNAL_URL/health" || echo "Ping failed (service may be cold-starting)."
